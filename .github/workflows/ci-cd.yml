name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    name: Run Tests & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Run Build
        run: npm run build

  docker-push:
    name: Build & Push Docker Images
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: shankhadeep25/shopsense-api:latest
          cache-from: type=registry,ref=shankhadeep25/shopsense-api:buildcache
          cache-to: type=registry,ref=shankhadeep25/shopsense-api:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: shankhadeep25/shopsense-web:latest
          # VITE_* vars are compile-time: they must be passed as build args
          # so they get embedded into the Vite bundle during the Docker build.
          # Add VITE_API_URL to your GitHub repo Secrets (Settings > Secrets).
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=registry,ref=shankhadeep25/shopsense-web:buildcache
          cache-to: type=registry,ref=shankhadeep25/shopsense-web:buildcache,mode=max

